name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/devesh1102/fd-rates-india
  CONTAINER_APP: fdrates-app
  RESOURCE_GROUP: rg-fdrates

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az extension add --name containerapp --upgrade --allow-preview true -y

            # Register GHCR credentials
            az containerapp registry set \
              --name ${{ env.CONTAINER_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server ghcr.io \
              --username ${{ github.actor }} \
              --password ${{ secrets.GITHUB_TOKEN }}

            # Deploy new image with min 1 replica always running
            az containerapp update \
              --name ${{ env.CONTAINER_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --min-replicas 1 \
              --max-replicas 1
