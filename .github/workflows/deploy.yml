name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE_NAME: caa6b1504c79acr.azurecr.io/fd-rates-india
  CONTAINER_APP: fdrates-app
  RESOURCE_GROUP: rg-fdrates
  ACR_NAME: caa6b1504c79acr

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push Docker image to ACR
        run: |
          docker build --no-cache -t ${{ env.IMAGE_NAME }}:latest -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Container Apps (managed identity pull)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az extension add --name containerapp --upgrade --allow-preview true -y

            # Use system managed identity to pull from ACR — no credentials needed
            az containerapp registry set \
              --name ${{ env.CONTAINER_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server caa6b1504c79acr.azurecr.io \
              --identity system

            az containerapp update \
              --name ${{ env.CONTAINER_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --min-replicas 0 \
              --max-replicas 1
